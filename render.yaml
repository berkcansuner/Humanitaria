# Render Blueprint — one Docker web service (FastAPI API + built Vue SPA).
# Free tier: ephemeral disk (SQLite users/conversations reset on sleep/deploy)
# and spins down after ~15 min idle. See DEPLOY.md.
services:
  - type: web
    name: humanitaria
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: frankfurt
    healthCheckPath: /health
    envVars:
      # Production behavior (HTTPS, same-origin SPA, no background ingestion).
      - key: ENVIRONMENT           # hides /docs, fail-fast on insecure default secret
        value: production
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: INGEST_SCHEDULE_HOURS   # disable scheduler (Pinecone write quota full; not needed)
        value: "0"
      - key: GEMINI_REASONING_EFFORT
        value: low
      # v3 cutover: all-country × last-1-year corpus + daily rolling-window retention
      # (ingest via Cloudflare Worker cron → POST /admin/ingest/cron).
      - key: PINECONE_NAMESPACE
        value: v3
      - key: RETENTION_DAYS
        value: "365"
      - key: RETENTION_PER_COUNTRY_CAP
        value: "200"
      - key: RATE_LIMIT_TRUSTED_HOPS   # Render = single reverse proxy → real client IP = rightmost XFF entry (audit P2-01)
        value: "1"
      # URLs assume the predicted host below. If Render appends a suffix to the
      # name, update these three + the Google redirect URI (see DEPLOY.md).
      - key: FRONTEND_URL
        value: https://humanitaria.onrender.com
      - key: GOOGLE_REDIRECT_URI
        value: https://humanitaria.onrender.com/auth/google/callback
      - key: CORS_ORIGINS
        value: https://humanitaria.onrender.com
      # Render generates a strong session-signing secret automatically.
      - key: AUTH_SESSION_SECRET
        generateValue: true
      # Secrets — set these in the Render dashboard (never committed).
      - key: DATABASE_URL           # Supabase Postgres (session pooler URI); empty = ephemeral SQLite
        sync: false
      - key: INGEST_TRIGGER_TOKEN   # shared secret for POST /admin/ingest/cron (Cloudflare Worker)
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: RELIEFWEB_APPNAME
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
